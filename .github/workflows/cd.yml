name: Vercel Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Skip when Vercel secrets are missing
        if: env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '' || env.VERCEL_TOKEN == ''
        run: |
          echo "VERCEL_ORG_ID / VERCEL_PROJECT_ID / VERCEL_TOKEN のいずれかが未設定のため Preview Deploy をスキップします。" >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        if: env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != ''
        run: npm install

      - name: Set frontend env
        if: env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != ''
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL_SECRET:-https://example.supabase.co}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY_SECRET:-dummy-anon-key}" >> "$GITHUB_ENV"
        env:
          SUPABASE_URL_SECRET: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY_SECRET: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Install Vercel CLI
        if: env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != ''
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != ''
        run: vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Build preview
        if: env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != ''
        run: vercel build --token="${VERCEL_TOKEN}"

      - name: Deploy preview
        if: env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != ''
        run: |
          url="$(vercel deploy --prebuilt --token="${VERCEL_TOKEN}")"
          echo "Preview URL: ${url}" >> "$GITHUB_STEP_SUMMARY"
