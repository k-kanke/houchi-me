name: CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "frontend/**"
  push:
    branches:
      - main
      - ci/**
      - feat/**
      - fix/**
      - hotfix/**
      - refactor/**
      - test/**
      - build/**
      - chore/**
    paths:
      - ".github/workflows/ci.yml"
      - "frontend/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Set frontend env
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL_SECRET:-https://example.supabase.co}" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY_SECRET:-dummy-anon-key}" >> "$GITHUB_ENV"
        env:
          SUPABASE_URL_SECRET: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY_SECRET: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build Next.js app
        run: npm run build

      - name: Job summary
        run: |
          {
            echo "## CI Summary"
            echo "- App: frontend (Next.js)"
            echo "- Node.js: 22"
            echo "- Checks: npm install, npm run build"
          } >> "$GITHUB_STEP_SUMMARY"
